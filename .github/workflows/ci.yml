# EN: GitHub Actions workflow for PHP syntax/integrity checks plus real database and workflow smoke tests.
# RU: GitHub Actions workflow для проверки PHP-синтаксиса/целостности плюс реальные smoke-тесты базы и workflow.

name: QazJumys CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
    branches:
      - main

jobs:
  php-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          extensions: pdo, pdo_mysql, mbstring, fileinfo

      - name: Run project checks
        run: php tests/run.php

  db-workflow-checks:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:10.6
        env:
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "1"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          extensions: pdo, pdo_mysql, mbstring, fileinfo

      - name: Create CI .env
        run: |
          cat > .env << 'ENV'
          APP_NAME=QazJumys
          APP_ENV=ci
          APP_DEBUG=false
          APP_URL=http://127.0.0.1:8014
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=qazjumys_portal
          DB_USERNAME=root
          DB_PASSWORD=
          SESSION_NAME=qazjumys_session
          MAIL_TO=owner@example.com
          MAIL_ENABLED=false
          MAIL_FROM=no-reply@qazjumys.local
          WHATSAPP_DEFAULT=
          UPLOAD_MAX_BYTES=5242880
          ENV

      - name: Import schema and seed
        run: |
          mysql --host=127.0.0.1 --port=3306 -uroot --default-character-set=utf8mb4 < database/schema.sql
          mysql --host=127.0.0.1 --port=3306 -uroot --default-character-set=utf8mb4 qazjumys_portal < database/seed.sql

      - name: Run database smoke test
        run: php tests/db_smoke.php

      - name: Run workflow smoke test
        run: php tests/workflow_smoke.php
